name: ET-SoC1 board benchmark

# Runs leaderboard smoke on a self-hosted ET-SoC1 board runner (real silicon, soc1sim).
#
# External fork PRs only reach the board job after GitHub's required
# external-contributor workflow approval gate has released the run. Same-repo
# PRs and pushes to main select the changed configured board models and run them
# on the self-hosted ET-SoC1 runner. Pushes to main can update data/*.json.
# Manual dispatches can run the default board suite or all configured models.

on:
  pull_request:
  workflow_call:
    inputs:
      trusted_yolo:
        description: "Use main-owned YOLO harness and overlay only participant implementation files."
        type: boolean
        required: false
        default: false
    secrets:
      BENCHMARK_ASSETS_URL:
        description: "Optional private benchmark asset archive for non-trusted callers."
        required: false
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to benchmark, e.g. refs/pull/1/merge. Empty = current ref."
        required: false
        default: ""
      models:
        description: "Space/comma-separated models. Empty = default models; use all for every configured model."
        required: false
        default: ""
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  # The single-board runner label serializes different PRs. Per-PR concurrency
  # only cancels obsolete attempts from the same submission, preserving the
  # rest of the hardware queue.
  group: et-soc1-board-${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}

jobs:
  authorize-board-run:
    name: Authorize board runner
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
      permission: ${{ steps.auth.outputs.permission }}
      reason: ${{ steps.auth.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Check actor repository permission
        id: auth
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name || '' }}
        run: |
          set -euo pipefail
          permission="$(gh api "repos/${GITHUB_REPOSITORY}/collaborators/${ACTOR}/permission" --jq .permission 2>/dev/null || echo none)"
          external_pr=0
          if [[ "$EVENT_NAME" == "pull_request" && -n "$HEAD_REPO" && "$HEAD_REPO" != "$GITHUB_REPOSITORY" ]]; then
            external_pr=1
          fi
          case "$permission" in
            admin|maintain)
              allowed=1
              reason="@${ACTOR} has ${permission} permission."
              ;;
            *)
              if [[ "$EVENT_NAME" == "pull_request_target" ]]; then
                allowed=1
                reason="The main-owned trusted workflow applies only allowlisted YOLO implementation paths and exposes no repository secrets."
              elif [[ "$external_pr" == "1" ]]; then
                allowed=1
                reason="External fork PR workflow was released by GitHub's required external-contributor approval gate."
              else
                allowed=0
                reason="@${ACTOR} has ${permission} permission. Ask an admin or maintainer to run the board workflow."
              fi
              ;;
          esac
          echo "permission=$permission" >> "$GITHUB_OUTPUT"
          echo "allowed=$allowed" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          {
            echo "### Board runner authorization"
            echo
            if [[ "$allowed" == "1" ]]; then
              echo "ET-SoC1 board run authorized. ${reason}"
            else
              echo "ET-SoC1 board run not authorized. ${reason}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Protect benchmark oracle and runner
        if: (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && steps.auth.outputs.permission != 'admin' && steps.auth.outputs.permission != 'maintain'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null || {
            git fetch --no-tags origin \
              "+refs/pull/${PR_NUMBER}/head:refs/remotes/pull/${PR_NUMBER}/head"
            fetched_head="$(git rev-parse "refs/remotes/pull/${PR_NUMBER}/head^{commit}")"
            [[ "$fetched_head" == "$HEAD_SHA" ]]
          }
          blocked=()
          while IFS= read -r path; do
            case "$path" in
              .github/workflows/*|\
              .github/ci/reference/llama32_1b.json|\
              .github/ci/reference/rwkv7_15b.json|\
              .github/ci/reference/yolo.json|\
              .github/ci/platform/deploy/*|\
              .github/ci/scripts/benchmark_config_helpers.py|\
              .github/ci/scripts/build_leaderboard_elf.sh|\
              .github/ci/scripts/changed_benchmark_models.py|\
              .github/ci/scripts/leaderboard_gate.py|\
              .github/ci/scripts/merge_leaderboard.py|\
              .github/ci/scripts/prepare_benchmark_inputs.sh|\
              .github/ci/scripts/prepare_trusted_llama32_candidate.py|\
              .github/ci/scripts/prepare_trusted_yolo_tree.py|\
              .github/ci/scripts/refresh_trusted_llama32_prs.sh|\
              .github/ci/scripts/refresh_trusted_yolo_prs.sh|\
              .github/ci/scripts/run_llama_server_benchmark.py|\
              .github/ci/scripts/run_model_benchmark.sh|\
              .github/ci/scripts/run_trusted_llama_benchmark.py|\
              .github/ci/scripts/run_trusted_llama32_candidate.sh|\
              .github/ci/scripts/run_yolo_host_reference.sh|\
              .github/ci/scripts/score_results.py|\
              .github/ci/scripts/trusted_llama32_gate.py|\
              .github/ci/scripts/trusted_llama32_input_hash.sh|\
              .github/ci/scripts/trusted_yolo_input_hash.sh|\
              scripts/run_sysemu_model_ports.sh|\
              ported_models/yolo/tools/host_reference.py|\
              ported_models/yolo/assets/yolo/coco_*_raw_480x640x3_uint8_rgb.bin)
                blocked+=("$path")
                ;;
            esac
          done < <(git diff --name-only --diff-filter=ACDMRTUXB "$BASE_SHA...$HEAD_SHA")
          if [[ "${#blocked[@]}" -eq 0 ]]; then
            exit 0
          fi
          {
            echo "### Protected benchmark files"
            echo
            echo "Participant PRs may optimize model implementation files, but may not edit the benchmark oracle or runner:"
            printf -- '- `%s`\n' "${blocked[@]}"
          } >> "$GITHUB_STEP_SUMMARY"
          printf 'error: protected benchmark file changed: %s\n' "${blocked[@]}" >&2
          exit 1

  select-board-models:
    name: Select board models
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.models.outputs.models }}
      has_models: ${{ steps.models.outputs.has_models }}
      unregistered: ${{ steps.models.outputs.unregistered }}
      has_unregistered: ${{ steps.models.outputs.has_unregistered }}
      uncovered: ${{ steps.models.outputs.uncovered }}
      has_uncovered: ${{ steps.models.outputs.has_uncovered }}
      trusted_yolo: ${{ steps.models.outputs.trusted_yolo }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.trusted_yolo && 'main' || github.event.inputs.ref || github.sha }}
          fetch-depth: 0
          persist-credentials: ${{ !inputs.trusted_yolo }}

      - name: Resolve benchmark models
        id: models
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODELS: ${{ github.event.inputs.models || '' }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BEFORE_SHA: ${{ github.event.before || '' }}
          PUSH_HEAD_SHA: ${{ github.sha }}
          TRUSTED_YOLO_MODE: ${{ inputs.trusted_yolo && '1' || '0' }}
        run: |
          set -euo pipefail
          unregistered=""
          uncovered=""
          trusted_yolo=0
          zero_sha="0000000000000000000000000000000000000000"
          if [[ "$TRUSTED_YOLO_MODE" == "1" ]]; then
            git fetch --no-tags origin \
              "+refs/pull/${{ github.event.pull_request.number }}/head:refs/remotes/pull/${{ github.event.pull_request.number }}/head"
            fetched_head="$(git rev-parse "refs/remotes/pull/${{ github.event.pull_request.number }}/head^{commit}")"
            if [[ "$fetched_head" != "$PR_HEAD_SHA" ]]; then
              echo "error: fetched PR head $fetched_head does not match event head $PR_HEAD_SHA" >&2
              exit 1
            fi
            git cat-file -e "${PR_BASE_SHA}^{commit}" 2>/dev/null \
              || git fetch --no-tags origin "$PR_BASE_SHA"
            trusted_yolo="$(python3 - "$PR_BASE_SHA" "$PR_HEAD_SHA" <<'PY'
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path(".github/ci/scripts").resolve()))
          from prepare_trusted_yolo_tree import changed_paths, is_allowed_path

          paths = changed_paths(Path.cwd(), sys.argv[1], sys.argv[2])
          print(1 if any(is_allowed_path(path) for path in paths) else 0)
          PY
          )"
            if [[ "$trusted_yolo" == "1" ]]; then
              models="yolo"
            else
              models=""
            fi
          elif [[ "$EVENT_NAME" == "pull_request" ]]; then
            models="$(python3 .github/ci/scripts/changed_benchmark_models.py \
              --target board \
              --base "$PR_BASE_SHA" \
              --head "$PR_HEAD_SHA" \
              --scope changed \
              --format space \
              --unregistered-out unregistered.txt \
              --uncovered-out uncovered.txt)"
            unregistered="$(cat unregistered.txt 2>/dev/null || true)"
            uncovered="$(cat uncovered.txt 2>/dev/null || true)"
          elif [[ "$EVENT_NAME" == "push" && -n "$PUSH_BEFORE_SHA" && "$PUSH_BEFORE_SHA" != "$zero_sha" ]]; then
            models="$(python3 .github/ci/scripts/changed_benchmark_models.py \
              --target board \
              --base "$PUSH_BEFORE_SHA" \
              --head "$PUSH_HEAD_SHA" \
              --scope changed \
              --format space \
              --unregistered-out unregistered.txt \
              --uncovered-out uncovered.txt)"
            unregistered="$(cat unregistered.txt 2>/dev/null || true)"
            uncovered="$(cat uncovered.txt 2>/dev/null || true)"
          else
            models="$(python3 .github/ci/scripts/benchmark_config_helpers.py \
              --target board \
              --models "$INPUT_MODELS" \
              --format space)"
          fi
          if [[ "$TRUSTED_YOLO_MODE" != "1" && "$EVENT_NAME" == "pull_request" ]] \
            && git cat-file -e "$PR_BASE_SHA:.github/workflows/trusted-yolo-pr.yml" 2>/dev/null \
            && [[ " $models " == *" yolo "* ]]; then
            trusted_yolo=1
            models="$(python3 - "$models" <<'PY'
          import sys
          print(" ".join(model for model in sys.argv[1].split() if model != "yolo"))
          PY
          )"
          fi
          echo "models=$models" >> "$GITHUB_OUTPUT"
          echo "unregistered=$unregistered" >> "$GITHUB_OUTPUT"
          echo "uncovered=$uncovered" >> "$GITHUB_OUTPUT"
          echo "trusted_yolo=$trusted_yolo" >> "$GITHUB_OUTPUT"
          if [[ -n "$models" ]]; then
            echo "has_models=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_models=0" >> "$GITHUB_OUTPUT"
          fi
          if [[ -n "$unregistered" ]]; then
            echo "has_unregistered=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_unregistered=0" >> "$GITHUB_OUTPUT"
          fi
          if [[ -n "$uncovered" ]]; then
            echo "has_uncovered=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_uncovered=0" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "### Board model selection"
            echo
            if [[ -n "$models" ]]; then
              echo "Selected models: \`$models\`"
            else
              echo "No changed board benchmark models were selected."
            fi
            if [[ -n "$unregistered" ]]; then
              echo
              echo "New ports without a benchmark entry: \`$unregistered\`"
            fi
            if [[ -n "$uncovered" ]]; then
              echo
              echo "Changed runtime source not covered by an adequate benchmark row: \`$uncovered\`"
            fi
            if [[ "$trusted_yolo" == "1" ]]; then
              echo
              echo "YOLO is delegated to the main-controlled \`Trusted YOLO leaderboard gate\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  board-benchmark:
    name: board (${{ needs.select-board-models.outputs.models || 'no models' }})
    needs: [authorize-board-run, select-board-models]
    if: needs.authorize-board-run.outputs.allowed == '1' && needs.select-board-models.outputs.has_models == '1'
    runs-on: [self-hosted, Linux, X64, et-soc1, board-ci, single-board]
    timeout-minutes: 240
    outputs:
      trusted_main_sha: ${{ steps.trusted-candidate.outputs.main_sha }}
      trusted_input_sha: ${{ steps.trusted-candidate.outputs.input_sha }}
    env:
      HOME: /root
      MODELS: ${{ needs.select-board-models.outputs.models }}
      SOC3_LOCAL: ${{ vars.SOC3_LOCAL || '1' }}
      SOC3_HOST: ${{ vars.SOC3_HOST || 'local' }}
      SOC3_SSH_ALIAS: ${{ vars.SOC3_SSH_ALIAS || 'aifoundry1' }}
      SOC3_SSH_KEY: ${{ vars.SOC3_SSH_KEY || '/root/.ssh/id_rsa' }}
      USE_TAILSCALE_SSH: "0"
      SOC3_BUILD_ET: ${{ vars.AIFOUNDRY1_SOC3_BUILD_ET || '/opt/et' }}
      ET_INSTALL: ${{ vars.AIFOUNDRY1_SOC3_BUILD_ET || '/opt/et' }}
      SOC3_REMOTE_ET_INSTALL: ${{ vars.AIFOUNDRY1_SOC3_REMOTE_ET_INSTALL || '/opt/et' }}
      SOC3_REMOTE_ET_PLATFORM: ${{ vars.AIFOUNDRY1_SOC3_REMOTE_ET_PLATFORM || '/opt/et' }}
      SOC3_FAIL_ON_MODEL_FAILURE: ${{ inputs.trusted_yolo && '1' || vars.AIFOUNDRY1_SOC3_FAIL_ON_MODEL_FAILURE || '0' }}
      ET_PLATFORM_SRC: ${{ vars.AIFOUNDRY1_ET_PLATFORM_SRC || '' }}
      LAUNCHER: ${{ vars.AIFOUNDRY1_SOC3_LAUNCHER || '' }}
      ET_LIB_PATH: ${{ vars.AIFOUNDRY1_SOC3_ET_LIB_PATH || '/opt/et/host:/opt/et/lib' }}
      ET_PLATFORM_REF: ${{ vars.ET_PLATFORM_REF || 'master' }}
      GITHUB_TOKEN: ${{ !inputs.trusted_yolo && github.token || '' }}
      BENCHMARK_ASSETS_DIR: ${{ vars.AIFOUNDRY1_BENCHMARK_ASSETS_DIR || vars.BENCHMARK_ASSETS_DIR || '' }}
      BENCHMARK_ASSETS_URL: ${{ !inputs.trusted_yolo && secrets.BENCHMARK_ASSETS_URL || '' }}
      LFM25_MODEL_PATH: ${{ vars.AIFOUNDRY1_LFM25_MODEL_PATH || '' }}
      WIKITEXT_RAW_PATH: ${{ vars.AIFOUNDRY1_WIKITEXT_RAW_PATH || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.trusted_yolo && 'main' || github.event.inputs.ref || github.sha }}
          fetch-depth: 0
          submodules: recursive
          persist-credentials: ${{ !inputs.trusted_yolo }}

      - name: Build candidate from trusted main and participant implementation
        id: trusted-candidate
        if: inputs.trusted_yolo
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_ACTOR: ${{ github.event.pull_request.user.login || github.actor }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "+refs/pull/${PR_NUMBER}/head:refs/remotes/pull/${PR_NUMBER}/head"
          fetched_head="$(git rev-parse "refs/remotes/pull/${PR_NUMBER}/head^{commit}")"
          if [[ "$fetched_head" != "$PR_HEAD_SHA" ]]; then
            echo "error: fetched PR head $fetched_head does not match event head $PR_HEAD_SHA" >&2
            exit 1
          fi
          git cat-file -e "${PR_BASE_SHA}^{commit}" 2>/dev/null \
            || git fetch --no-tags origin "$PR_BASE_SHA"

          trusted_main_sha="$(git rev-parse HEAD)"
          metadata="${GITHUB_WORKSPACE}/trusted-yolo-candidate.json"
          python3 .github/ci/scripts/prepare_trusted_yolo_tree.py \
            --base "$PR_BASE_SHA" \
            --head "$PR_HEAD_SHA" \
            --main "$trusted_main_sha" \
            --metadata "$metadata"

          git config user.name "AIFoundry trusted gate"
          git config user.email "actions@users.noreply.github.com"
          git commit --no-gpg-sign -m "Trusted YOLO candidate for PR ${PR_NUMBER}"
          candidate_sha="$(git rev-parse HEAD)"
          contract_sha="$(sha256sum .github/ci/reference/yolo.json | awk '{print $1}')"
          trusted_input_sha="$(.github/ci/scripts/trusted_yolo_input_hash.sh "$trusted_main_sha")"

          {
            echo "main_sha=$trusted_main_sha"
            echo "input_sha=$trusted_input_sha"
          } >> "$GITHUB_OUTPUT"
          {
            echo "TRUSTED_MAIN_SHA=$trusted_main_sha"
            echo "TRUSTED_CANDIDATE_SHA=$candidate_sha"
            echo "PARTICIPANT_SHA=$PR_HEAD_SHA"
            echo "LEADERBOARD_TEAM=$PR_ACTOR"
            echo "TRUSTED_YOLO_INPUT_SHA=$trusted_input_sha"
          } >> "$GITHUB_ENV"
          {
            echo "### Trusted YOLO candidate"
            echo
            echo "- Main harness: \`$trusted_main_sha\`"
            echo "- Participant commit: \`$PR_HEAD_SHA\`"
            echo "- Synthetic candidate: \`$candidate_sha\`"
            echo "- Validation contract: \`$contract_sha\`"
            echo "- Trusted input set: \`$trusted_input_sha\`"
            echo
            echo "Only approved YOLO implementation and packed-weight paths were applied:"
            python3 - "$metadata" <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1]))
          for path in payload["applied_paths"]:
              print(f"- `{path}`")
          ignored = payload.get("ignored_paths", [])
          if ignored:
              print("\nAll other participant paths were ignored by the trusted harness.")
          PY
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve benchmark ref
        id: bench
        env:
          INPUT_REF: ${{ github.event.inputs.ref || '' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          TRUSTED_YOLO_MODE: ${{ inputs.trusted_yolo && '1' || '0' }}
        run: |
          if [[ "$TRUSTED_YOLO_MODE" == "1" ]]; then
            echo "sha=$PR_HEAD_SHA" >> "$GITHUB_OUTPUT"
            echo "ref=refs/pull/${PR_NUMBER}/head" >> "$GITHUB_OUTPUT"
            echo "pr=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "ref=${INPUT_REF:-$GITHUB_REF}" >> "$GITHUB_OUTPUT"
            if [[ "$INPUT_REF" =~ ^refs/pull/([0-9]+)/merge$ ]]; then
              echo "pr=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Resolve leaderboard team
        env:
          GH_TOKEN: ${{ github.token }}
          PR_ACTOR: ${{ github.event.pull_request.user.login || github.actor }}
          TRUSTED_YOLO_MODE: ${{ inputs.trusted_yolo && '1' || '0' }}
        run: |
          if [[ "$TRUSTED_YOLO_MODE" == "1" ]]; then
            team="$PR_ACTOR"
          else
            team="$(.github/ci/scripts/resolve_leaderboard_team.sh "${{ steps.bench.outputs.sha }}")"
          fi
          echo "LEADERBOARD_TEAM=$team" >> "$GITHUB_ENV"
          echo "Leaderboard team: \`$team\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve board host paths
        run: |
          if [[ -z "${ET_PLATFORM_SRC:-}" ]]; then
            echo "ET_PLATFORM_SRC=${RUNNER_TEMP}/et-platform" >> "$GITHUB_ENV"
          fi

      - name: Check board access configuration
        id: board-access
        run: |
          mkdir -p board-scores
          missing=()
          [[ -e /dev/et0_mgmt ]] || missing+=("/dev/et0_mgmt")
          [[ -x "${ET_INSTALL}/bin/riscv64-unknown-elf-gcc" ]] || missing+=("${ET_INSTALL}/bin/riscv64-unknown-elf-gcc")
          if [[ ! -f "${ET_PLATFORM_SRC}/gp-sdk/device/sdk/lib/erbium-soc1sim/erbium.ld" ]]; then
            command -v git >/dev/null || missing+=("git (needed to clone et-platform)")
          fi
          if [[ -n "${LAUNCHER:-}" && ! -x "${LAUNCHER}" ]]; then
            missing+=("configured launcher ${LAUNCHER}")
          fi
          source .github/ci/platform/deploy/soc3-ssh.sh
          if ! soc3_is_local; then
            read -r -a ssh_cmd <<<"$(soc3_ssh_cmd)"
            timeout 20 "${ssh_cmd[@]}" true 2>/dev/null || missing+=("ssh to board host")
          fi

          if [[ "${#missing[@]}" -eq 0 ]]; then
            echo "run_board=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run_board=0" >> "$GITHUB_OUTPUT"
          note="Self-hosted ET-SoC1 board runner is online, but hardware access is incomplete: $(IFS=', '; echo "${missing[*]}")."
          for model in $MODELS; do
            python3 .github/ci/scripts/score_results.py \
              --model "$model" \
              --output "board-scores/score-${model}.json" \
              --sha "${{ steps.bench.outputs.sha }}" \
              --ref "${{ steps.bench.outputs.ref }}" \
              --actor "${LEADERBOARD_TEAM:-${GITHUB_ACTOR:-local}}" \
              --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --status skipped \
              --note "$note"
          done

      - name: Check local prebuild dependencies
        if: steps.board-access.outputs.run_board == '1'
        run: |
          for tool in git curl python3 rsync docker cmake; do
            command -v "$tool" >/dev/null
          done

      - name: Prepare Dockerized RISC-V toolchain
        if: steps.board-access.outputs.run_board == '1'
        run: |
          real_et_root="${SOC3_BUILD_ET}"
          real_platform_src="${ET_PLATFORM_SRC}"
          cat > "${RUNNER_TEMP}/Dockerfile.et-gcc" <<'EOF'
          FROM ubuntu:24.04
          # libmpc3: runtime dep of the ET RISC-V gcc. lld: the ggml-et device
          # kernels link with -fuse-ld=lld, and the ET /opt/et toolchain ships no
          # lld, so provide LLVM lld (ld.lld) inside the container.
          RUN apt-get update \
            && apt-get install -y --no-install-recommends libmpc3 lld \
            && rm -rf /var/lib/apt/lists/*
          EOF
          docker build -t et-gcc:24.04 -f "${RUNNER_TEMP}/Dockerfile.et-gcc" "${RUNNER_TEMP}"
          mkdir -p "${RUNNER_TEMP}/et-docker/bin"
          cat > "${RUNNER_TEMP}/et-docker/bin/riscv64-unknown-elf-gcc" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          workspace="\${GITHUB_WORKSPACE:-\$PWD}"
          exec docker run --rm \
            -v "\${workspace}:\${workspace}" \
            -v "${real_et_root}:${real_et_root}:ro" \
            -v "${real_platform_src}:${real_platform_src}:ro" \
            -w "\$PWD" \
            et-gcc:24.04 \
            "${real_et_root}/bin/riscv64-unknown-elf-gcc" "\$@"
          EOF
          chmod +x "${RUNNER_TEMP}/et-docker/bin/riscv64-unknown-elf-gcc"
          echo "SOC3_BUILD_ET=${RUNNER_TEMP}/et-docker" >> "$GITHUB_ENV"
          echo "ET_INSTALL=${RUNNER_TEMP}/et-docker" >> "$GITHUB_ENV"

      - name: Prepare local ELF prebuild inputs
        if: steps.board-access.outputs.run_board == '1'
        run: |
          chmod +x .github/ci/scripts/*.sh scripts/*.sh .github/ci/platform/deploy/*.sh
          .github/ci/scripts/install_toolchain.sh
          if [[ ! -f "${ET_PLATFORM_SRC}/gp-sdk/device/sdk/lib/erbium-soc1sim/erbium.ld" ]]; then
            git clone --depth 1 --branch "${ET_PLATFORM_REF}" \
              "https://github.com/${ET_PLATFORM_REPO:-aifoundry-org/et-platform}.git" \
              "${ET_PLATFORM_SRC}" || \
            git clone --depth 1 \
              "https://github.com/${ET_PLATFORM_REPO:-aifoundry-org/et-platform}.git" \
              "${ET_PLATFORM_SRC}"
          fi

      - name: Run board benchmarks
        id: board_run
        if: steps.board-access.outputs.run_board == '1'
        # On PRs the board run is informational: per-model pass/fail is reported in
        # the PR comment and scores, so a model that does not build yet must not
        # red-X the PR. Pushes to main stay strict (the leaderboard update depends
        # on a clean board run).
        continue-on-error: ${{ github.event_name == 'pull_request' || inputs.trusted_yolo }}
        env:
          GITHUB_SHA: ${{ inputs.trusted_yolo && github.event.pull_request.head.sha || github.sha }}
          GITHUB_REF: ${{ inputs.trusted_yolo && format('refs/pull/{0}/head', github.event.pull_request.number) || github.ref }}
          GITHUB_ACTOR: ${{ inputs.trusted_yolo && github.event.pull_request.user.login || github.actor }}
        run: |
          .github/ci/platform/deploy/soc3-benchmark.sh

      - name: Pull board outputs
        if: always() && steps.board-access.outputs.run_board == '1'
        run: |
          source .github/ci/platform/deploy/soc3-ssh.sh
          mkdir -p board-output board-scores
          if soc3_is_local; then
            cp -a /root/et-jobs-deploy/benchmark-output/. board-output/ 2>/dev/null || true
          else
            rsh="$(soc3_rsync_rsh)"
            host="$(soc3_rsync_host)"
            rsync -az -e "${rsh}" "${host}:/root/et-jobs-deploy/benchmark-output/" board-output/ || true
          fi
          cp board-output/score-*.json board-scores/ 2>/dev/null || true
          ls -la board-output || true
          ls -la board-scores

      - name: Write missing board failure scores
        if: always() && steps.board-access.outputs.run_board == '1'
        run: |
          note="Board benchmark did not produce a score for this model; see board-benchmark-debug artifact and workflow logs."
          for model in $MODELS; do
            [[ -f "board-scores/score-${model}.json" ]] && continue
            python3 .github/ci/scripts/score_results.py \
              --model "$model" \
              --output "board-scores/score-${model}.json" \
              --sha "${{ steps.bench.outputs.sha }}" \
              --ref "${{ steps.bench.outputs.ref }}" \
              --actor "${LEADERBOARD_TEAM:-${GITHUB_ACTOR:-local}}" \
              --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --status fail \
              --note "$note"
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: board-benchmark-scores
          path: board-scores/
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: board-benchmark-debug
          path: board-output/
          if-no-files-found: ignore
          retention-days: 14

  pr-comment:
    name: PR board comment
    needs: [authorize-board-run, select-board-models, board-benchmark]
    if: always() && github.event_name == 'pull_request' && !inputs.trusted_yolo
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        if: needs.select-board-models.outputs.has_models == '1'
        continue-on-error: true
        with:
          name: board-benchmark-scores
          path: board-scores

      - name: Build board comment body
        env:
          HAS_MODELS: ${{ needs.select-board-models.outputs.has_models }}
          HAS_UNREGISTERED: ${{ needs.select-board-models.outputs.has_unregistered }}
          HAS_UNCOVERED: ${{ needs.select-board-models.outputs.has_uncovered }}
          TRUSTED_YOLO: ${{ needs.select-board-models.outputs.trusted_yolo }}
          SELECTED_MODELS: ${{ needs.select-board-models.outputs.models }}
          UNREGISTERED: ${{ needs.select-board-models.outputs.unregistered }}
          UNCOVERED: ${{ needs.select-board-models.outputs.uncovered }}
          BOARD_RESULT: ${{ needs.board-benchmark.result }}
          BOARD_AUTH_ALLOWED: ${{ needs.authorize-board-run.outputs.allowed }}
          BOARD_AUTH_PERMISSION: ${{ needs.authorize-board-run.outputs.permission }}
          BOARD_AUTH_REASON: ${{ needs.authorize-board-run.outputs.reason }}
          BOARD_ACTOR: ${{ github.actor }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          LEADERBOARD_MIN_RELATIVE_IMPROVEMENT: ${{ vars.LEADERBOARD_MIN_RELATIVE_IMPROVEMENT || '0' }}
        run: |
          set -euo pipefail
          if [[ "$HAS_MODELS" != "1" && "$HAS_UNREGISTERED" != "1" && "$HAS_UNCOVERED" != "1" ]]; then
            cat > /tmp/board-comment.md <<EOF
          ## ET-SoC1 board benchmark

          Workflow: [${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          Commit: \`${GITHUB_SHA:0:12}\` - ref \`${GITHUB_REF}\`

          No changed board benchmark models were selected for this PR.

          _Real ET-SoC1 PR runs are scoped to configured board models touched by the PR._
          EOF
            if [[ "$TRUSTED_YOLO" == "1" ]]; then
              printf '\n_YOLO is evaluated separately by the main-controlled `Trusted YOLO leaderboard gate`._\n' \
                >> /tmp/board-comment.md
            fi
            exit 0
          fi

          mkdir -p board-scores
          python3 .github/ci/scripts/format_pr_comment.py \
            --scores-dir board-scores \
            --output /tmp/board-comment.md \
            --target board \
            --models "$SELECTED_MODELS" \
            --unregistered "$UNREGISTERED" \
            --uncovered "$UNCOVERED" \
            --title "ET-SoC1 board benchmark" \
            --sha "$GITHUB_SHA" \
            --ref "$GITHUB_REF" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --footer "Real board PR runs select the changed configured board models only. Main branch pushes update the leaderboard."
          if [[ "$BOARD_AUTH_ALLOWED" != "1" ]]; then
            printf '\n_Board run was not started: %s_\n' "$BOARD_AUTH_REASON" >> /tmp/board-comment.md
          fi
          if [[ "$HAS_MODELS" == "1" && "$BOARD_RESULT" != "success" ]]; then
            printf '\n_Board job result: `%s`._\n' "$BOARD_RESULT" >> /tmp/board-comment.md
          fi
          if [[ "$TRUSTED_YOLO" == "1" ]]; then
            printf '\n_YOLO is evaluated separately by the main-controlled `Trusted YOLO leaderboard gate`._\n' \
              >> /tmp/board-comment.md
          fi
          python3 .github/ci/scripts/leaderboard_gate.py \
            --scores-dir board-scores \
            --models "$SELECTED_MODELS" \
            --unregistered "$UNREGISTERED" \
            --uncovered "$UNCOVERED" \
            --target board \
            --base-ref "$PR_BASE_SHA" \
            --output /tmp/leaderboard-gate.md || true
          {
            echo
            cat /tmp/leaderboard-gate.md
          } >> /tmp/board-comment.md

      - uses: peter-evans/create-or-update-comment@v4
        continue-on-error: true
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: /tmp/board-comment.md
          comment-tag: et-soc1-board-benchmark

  leaderboard-gate:
    name: ${{ inputs.trusted_yolo && 'Trusted YOLO leaderboard gate' || 'Leaderboard gate' }}
    needs: [authorize-board-run, select-board-models, board-benchmark]
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.trusted_yolo && 'main' || github.sha }}
          fetch-depth: 0
          persist-credentials: ${{ !inputs.trusted_yolo }}

      - uses: actions/download-artifact@v4
        if: needs.select-board-models.outputs.has_models == '1'
        continue-on-error: true
        with:
          name: board-benchmark-scores
          path: board-scores

      - name: Confirm trusted main inputs stayed current
        if: inputs.trusted_yolo && needs.select-board-models.outputs.has_models == '1'
        env:
          EXPECTED_INPUT_SHA: ${{ needs.board-benchmark.outputs.trusted_input_sha }}
          TRUSTED_MAIN_SHA: ${{ needs.board-benchmark.outputs.trusted_main_sha }}
        run: |
          set -euo pipefail
          if [[ -z "$EXPECTED_INPUT_SHA" || -z "$TRUSTED_MAIN_SHA" ]]; then
            echo "Trusted YOLO board job did not report its main input set." >&2
            exit 1
          fi
          current_main="$(git rev-parse HEAD)"
          current_input_sha="$(.github/ci/scripts/trusted_yolo_input_hash.sh "$current_main")"
          if [[ "$current_input_sha" != "$EXPECTED_INPUT_SHA" ]]; then
            echo "Trusted YOLO inputs or baseline changed while this run was active." >&2
            echo "Started from $TRUSTED_MAIN_SHA ($EXPECTED_INPUT_SHA)." >&2
            echo "Current main is $current_main ($current_input_sha)." >&2
            echo "Re-run all jobs to evaluate the participant patch on current main." >&2
            exit 1
          fi

      - name: Compare PR scores to leaderboard
        env:
          AUTH_RESULT: ${{ needs.authorize-board-run.result }}
          SELECT_RESULT: ${{ needs.select-board-models.result }}
          BOARD_RESULT: ${{ needs.board-benchmark.result }}
          HAS_MODELS: ${{ needs.select-board-models.outputs.has_models }}
          SELECTED_MODELS: ${{ needs.select-board-models.outputs.models }}
          UNREGISTERED: ${{ needs.select-board-models.outputs.unregistered }}
          UNCOVERED: ${{ needs.select-board-models.outputs.uncovered }}
          PR_BASE_SHA: ${{ inputs.trusted_yolo && needs.board-benchmark.outputs.trusted_main_sha || github.event.pull_request.base.sha }}
          TRUSTED_YOLO_MODE: ${{ inputs.trusted_yolo && '1' || '0' }}
          LEADERBOARD_MIN_RELATIVE_IMPROVEMENT: ${{ vars.LEADERBOARD_MIN_RELATIVE_IMPROVEMENT || '0' }}
        run: |
          set -euo pipefail
          if [[ "$AUTH_RESULT" != "success" || "$SELECT_RESULT" != "success" ]]; then
            echo "Board authorization or model selection failed." >&2
            exit 1
          fi
          if [[ "$HAS_MODELS" == "1" && "$BOARD_RESULT" != "success" ]]; then
            echo "Selected board job result: $BOARD_RESULT" >&2
            exit 1
          fi
          extra_args=()
          if [[ "$TRUSTED_YOLO_MODE" == "1" && "$HAS_MODELS" == "1" ]]; then
            extra_args+=(--require-baseline --force-submission-models yolo)
          fi
          python3 .github/ci/scripts/leaderboard_gate.py \
            --scores-dir board-scores \
            --models "$SELECTED_MODELS" \
            --unregistered "$UNREGISTERED" \
            --uncovered "$UNCOVERED" \
            --target board \
            --base-ref "$PR_BASE_SHA" \
            "${extra_args[@]}" \
            --output "$GITHUB_STEP_SUMMARY"

  update-leaderboard:
    name: Update board leaderboard
    needs: [select-board-models, board-benchmark]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.select-board-models.outputs.has_models == '1' && needs.board-benchmark.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: board-benchmark-scores
          path: board-scores

      - name: Merge board scores into leaderboard
        env:
          SELECTED_MODELS: ${{ needs.select-board-models.outputs.models }}
        run: python3 .github/ci/scripts/merge_leaderboard.py --scores-dir board-scores --models "$SELECTED_MODELS"

      - name: Commit leaderboard
        run: |
          set -euo pipefail
          if git diff --quiet data README.md; then
            echo "No leaderboard changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json README.md
          git commit -m "chore(leaderboard): update ET-SoC1 board scores [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

  invalidate-trusted-yolo-prs:
    name: Invalidate stale trusted YOLO checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Mark open YOLO PRs pending when trusted inputs changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/ci/scripts/refresh_trusted_yolo_prs.sh "${{ github.event.before }}" HEAD pending-only

  refresh-trusted-yolo-prs:
    name: Refresh open trusted YOLO checks
    needs: [select-board-models, board-benchmark, update-leaderboard]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Re-run open YOLO PRs when trusted inputs changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/ci/scripts/refresh_trusted_yolo_prs.sh "${{ github.event.before }}" HEAD

  invalidate-trusted-llama32-prs:
    name: Invalidate stale trusted Llama checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Mark open Llama PRs pending when trusted inputs changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/ci/scripts/refresh_trusted_llama32_prs.sh "${{ github.event.before }}" HEAD pending-only

  refresh-trusted-llama32-prs:
    name: Refresh open trusted Llama checks
    needs: [select-board-models, board-benchmark, update-leaderboard]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Re-run open Llama PRs when trusted inputs changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/ci/scripts/refresh_trusted_llama32_prs.sh "${{ github.event.before }}" HEAD
